services:
  api:
    build:
      context: .
    image: commercemind:local
    ports:
      - "8000:8000"
    environment:
      COMMERCE_MIND_ENVIRONMENT: production
      COMMERCE_MIND_LOG_LEVEL: INFO
      COMMERCE_MIND_CATALOG_SOURCE: sample
      COMMERCE_MIND_DATABASE_URL: sqlite+pysqlite:////app/work/commercemind.db
      COMMERCE_MIND_API_HOST: 0.0.0.0
      COMMERCE_MIND_API_PORT: 8000
    volumes:
      - ./work:/app/work
      - ./artifacts:/app/artifacts
      - ./reports:/app/reports
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    profiles:
      - database
    environment:
      POSTGRES_DB: commercemind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
